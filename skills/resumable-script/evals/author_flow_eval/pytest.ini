[pytest]
# One parametrized test (test_authoring_e2e); each suite is a marker so `pytest -m L3` selects it.
markers =
    L1: spine + interpolation — input canaries surface in the rendered human question
    L2: prior-step threading — a model step's stored finding surfaces in a later gate
    L3: runtime routing — same task, valid/invalid inputs must reach opposite terminals
    L4: cycles — a gate routes back for revision until the reviewer accepts
    L5: cross-run state — run 2's question references run 1's final state
    L6: flagship — agent reads/writes state via MCP tools; gate surfaces its finding
addopts = -ra
